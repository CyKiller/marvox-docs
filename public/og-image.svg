  <text x="284" y="223" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="28" font-weight="600" fill="hsl(196,100%,67%)"> Docs</text>
  <!-- Main headline -->
  <text x="100" y="330" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="56" font-weight="700" fill="white" letter-spacing="-1">Marvox Documentation</text>
  <!-- Subtitle -->
  <text x="100" y="390" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="26" fill="rgba(148,163,184,0.85)">Build character-aware storyworlds with CharacterOS</text>
  <!-- Tag row -->
  <rect x="100" y="440" width="140" height="32" rx="6" fill="rgba(125,211,252,0.10)" stroke="rgba(125,211,252,0.22)" stroke-width="1"/>
  <text x="170" y="461" font-family="monospace" font-size="13" fill="hsl(196,100%,67%)" text-anchor="middle">API Reference</text>
  <rect x="256" y="440" width="120" height="32" rx="6" fill="rgba(125,211,252,0.10)" stroke="rgba(125,211,252,0.22)" stroke-width="1"/>
  <text x="316" y="461" font-family="monospace" font-size="13" fill="hsl(196,100%,67%)" text-anchor="middle">25+ Agents</text>
  <rect x="392" y="440" width="130" height="32" rx="6" fill="rgba(125,211,252,0.10)" stroke="rgba(125,211,252,0.22)" stroke-width="1"/>
  <text x="457" y="461" font-family="monospace" font-size="13" fill="hsl(196,100%,67%)" text-anchor="middle">Workflows</text>
