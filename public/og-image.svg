<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020c1b"/>
      <stop offset="100%" style="stop-color:#010409"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0%" cy="0%" r="60%">
      <stop offset="0%" style="stop-color:rgba(56,189,248,0.18)"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </radialGradient>
    <radialGradient id="glow2" cx="100%" cy="0%" r="55%">
      <stop offset="0%" style="stop-color:rgba(34,211,238,0.12)"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>
  <!-- Logo mark -->
  <rect x="100" y="200" width="64" height="64" rx="14" fill="url(#logoGrad)"/>
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:hsl(196,100%,67%)"/>
      <stop offset="100%" style="stop-color:hsl(196,80%,48%)"/>
    </linearGradient>
  </defs>
  <!-- Book icon in logo -->
  <text x="132" y="242" font-family="system-ui" font-size="28" text-anchor="middle" fill="#020817">📖</text>
